version: 1
golden_set: golden.jsonl
baseline: asr-best
artifact_selection:
  primary_output: note_txt
  copy_attachments: true
evaluator:
  model: gpt-5-mini
variants:
  - id: asr-best
    description: Best-quality deterministic demo with stronger ASR and detailed note formatting.
    generator:
      kind: pipeline
    params:
      callable: deterministic_pipeline.fake_pipeline:run_pipeline
      pipeline_config:
        preprocessing:
          denoise: mild
          voice_enhancement: on
          silence_trimming: conservative
          vad: basic
        asr:
          model: whisper
        note_generation:
          model: gpt-5
          prompt_style: detailed
pipeline:
  - id: exact
    kind: exact_match
reporting:
  formats: [markdown, json]
