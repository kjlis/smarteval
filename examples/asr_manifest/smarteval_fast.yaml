version: 1
golden_set: golden.jsonl
baseline: asr-fast
artifact_selection:
  primary_output: note_txt
  copy_attachments: true
evaluator:
  model: gpt-5-mini
variants:
  - id: asr-fast
    description: Weak baseline deterministic demo with rough language, missing details, and vague recommendations.
    generator:
      kind: pipeline
    params:
      callable: deterministic_pipeline.fake_pipeline:run_pipeline
      pipeline_config:
        preprocessing:
          denoise: off
          voice_enhancement: off
          silence_trimming: aggressive
          vad: strict
        asr:
          model: parakeet
        note_generation:
          model: gpt-5-mini
          prompt_style: brief
pipeline:
  - id: exact
    kind: exact_match
reporting:
  formats: [markdown, json]
