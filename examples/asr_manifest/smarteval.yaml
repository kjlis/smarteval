version: 1
golden_set: golden.jsonl
baseline: baseline
artifact_selection:
  primary_output: note_txt
  copy_attachments: true
optimization:
  search_space:
    allowed_values:
      params.pipeline_config.preprocessing.denoise: ["off", mild, aggressive]
      params.pipeline_config.preprocessing.voice_enhancement: ["off", "on"]
      params.pipeline_config.preprocessing.silence_trimming: [aggressive, moderate, conservative]
      params.pipeline_config.preprocessing.vad: [strict, balanced, moderate, basic]
      params.pipeline_config.asr.model: [parakeet, whisper]
      params.pipeline_config.note_generation.model: [gpt-5-mini, gpt-5]
      params.pipeline_config.note_generation.prompt_style: [brief, soap, detailed]
  diversity:
    require_one_of:
      - params.pipeline_config.asr.model
evaluator:
  model: gpt-5.4
variants:
  - id: baseline
    description: Weak baseline deterministic demo with rough language and vague planning.
    generator:
      kind: pipeline
    params:
      callable: deterministic_pipeline.fake_pipeline:run_pipeline
      pipeline_config:
        preprocessing:
          denoise: off
          voice_enhancement: off
          silence_trimming: aggressive
          vad: strict
        asr:
          model: parakeet
        note_generation:
          model: gpt-5-mini
          prompt_style: brief
pipeline:
  - id: note_quality
    kind: llm_rubric
    rubric: rubrics/note_quality.yaml
reporting:
  formats: [markdown, json]
